<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0; padding: 15px;
            font-family: 'Segoe UI', sans-serif;
            background: transparent; color: #333;
        }

        .post-card {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid white;
            text-decoration: none; /* Usuwa podkreślenie linku */
            display: block;
        }

        .post-card:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-3px);
        }

        .post-card img {
            width: 100%; height: 100px;
            object-fit: cover; border-radius: 12px;
            margin-bottom: 10px;
        }

        .card-title { font-weight: bold; color: #111; margin-bottom: 5px; }
        .card-desc { font-size: 0.85rem; color: #555; }
    </style>
</head>
<body>

    <a href="post1.html" class="post-card">
        <img src="assets/img/blog/pic1.jpg" alt="Update">
        <div class="card-title">Wielka Aktualizacja Konfetti 🎊</div>
        <div class="card-desc">Dowiedz się więcej o nowym systemie cząsteczek...</div>
    </a>

    <a href="post2.html" class="post-card">
        <img src="assets/img/blog/pic2.jpg" alt="Music">
        <div class="card-title">Nowy utwór: Eurodab 🎵</div>
        <div class="card-desc">Sprawdź dlaczego ten kawałek rządzi na stronie.</div>
    </a>

</body>
</html>
