<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>About Me - Rodtech</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            
            /* Animowane tło */
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Styl dla przycisku narratora */
        .narrator-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #fff;
            color: #555;
            border: 2px solid #fff;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .narrator-btn:hover {
            transform: scale(1.05);
            background-color: #fce4ec;
        }
    </style>
</head>
<body>

    <img src="assets/img/logo/logo.png" alt="Logo" style="width: 120px; height: auto; margin-bottom: 30px;">

    <h1 style="color: #333; margin-bottom: 20px;">About Me</h1>

    <div style="max-width: 600px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); line-height: 1.6; color: #555;">
        <!-- Dodano ID do tekstu, aby skrypt wiedział, co ma przeczytać -->
        <p id="text-to-read">
         Hello im rodatip21!, Welcome to my Site.
        </p>
        <p id="text-to-read-2">
         WAIT FOR ANOTHER UPDATES. 
        </p>
    </div>

    <!-- Przycisk włączający narratora -->
    <button class="narrator-btn" onclick="speakText()">🔊 Listen to text</button>

    <a href="index.html" style="
        margin-top: 40px;
        display: inline-block;
        padding: 10px 25px;
        background-color: #666;
        color: white;
        text-decoration: none;
        font-size: 0.9rem;
        border-radius: 30px;
    ">← Go to Main Site!</a>

    <!-- Skrypt JavaScript obsługujący narratora -->
    <script>
        function speakText() {
            // Sprawdzenie, czy przeglądarka obsługuje Web Speech API
            if ('speechSynthesis' in window) {
                // Pobieranie tekstu z akapitów
                const part1 = document.getElementById('text-to-read').innerText;
                const part2 = document.getElementById('text-to-read-2').innerText;
                
                // Łączenie tekstu
                const fullText = part1 + " " + part2;

                // Tworzenie obiektu wypowiedzi
                const utterance = new SpeechSynthesisUtterance(fullText);
                
                // Ustawienie języka na angielski (żeby narrator czytał z odpowiednim akcentem)
                utterance.lang = 'en-US';
                
                // Opcjonalne ustawienia głosu (np. tempo i wysokość)
                utterance.rate = 1; // Szybkość (0.1 do 10)
                utterance.pitch = 1; // Wysokość głosu (0 do 2)

                // Uruchomienie odtwarzania
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Sorry, your browser doesn't support text-to-speech.");
            }
        }
    </script>

</body>
</html>
