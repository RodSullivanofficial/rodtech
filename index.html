<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RodTECH - Bass Boost Confetti</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            flex-direction: column; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
            background-size: 400% 400%; animation: gradientMove 10s ease infinite;
            overflow: hidden; text-align: center;
        }

        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #expanding-box {
            position: absolute; left: 40px; top: 50%; transform: translateY(-50%);
            width: 240px; height: 350px; background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px); border: 2px solid white; border-radius: 25px;
            padding: 15px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10;
        }
        #expanding-box:hover { width: 420px; height: 500px; background: rgba(255, 255, 255, 0.8); }

        .logo-img { width: 150px; transition: 0.1s; } /* Szybszy transition dla efektu basu */
        .main-title { font-size: 3.5rem; color: #333; margin: 10px 0; }

        #music-panel {
            position: absolute; bottom: 30px; left: 30px;
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px);
            padding: 12px 25px; border-radius: 50px; border: 1px solid white;
            display: flex; align-items: center; gap: 15px;
        }
        .player-ctrl { background: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="expanding-box">
        <h3 style="margin: 0; color: #ff0055; text-align: left;">DevLog</h3>
        <iframe src="updates.html" style="width:100%; height:90%; border:none; margin-top:10px;"></iframe>
    </div>

    <img src="./assets/img/Logo/logo.png" id="main-logo" class="logo-img" alt="Logo">
    <h1 class="main-title">RodTECH</h1>

    <div id="music-panel">
        <button class="player-ctrl" onclick="changeTrack(-1)">❮</button>
        <button class="player-ctrl" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="player-ctrl" onclick="changeTrack(1)">❯</button>
        <div id="song-info" style="font-size: 14px; font-weight: bold; min-width: 200px; text-align: left;">
            🎵 <span id="track-name">Kliknij Start</span>
        </div>
    </div>

    <audio id="bg-audio" crossorigin="anonymous"></audio>

    <script>
        const audio = document.getElementById('bg-audio');
        const logo = document.getElementById('main-logo');
        const trackLabel = document.getElementById('track-name');
        
        const playlist = [
            { title: "Eurodab", file: "assets/sounds/main/song1.mp3" },
            { title: "Linkin Park - In The End", file: "assets/sounds/main/song2.mp3" }
        ];

        let currentTrack = 0;
        let isPlaying = false;
        let audioCtx, analyser, dataArray, source;

        // Inicjalizacja analizatora dźwięku
        function initAudioContext() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);

            analyser.fftSize = 64; // Mała próbka dla szybkości (bas jest na początku)
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            
            draw();
        }

        function draw() {
            requestAnimationFrame(draw);
            if (!isPlaying) return;

            analyser.getByteFrequencyData(dataArray);

            // Bas to pierwsze kilka przedziałów (0-4)
            let bassValue = 0;
            for(let i = 0; i < 4; i++) { bassValue += dataArray[i]; }
            bassValue = bassValue / 4;

            // Efekt wizualny na Logo (pulsuje w rytm basu)
            let scale = 1 + (bassValue / 500);
            logo.style.transform = `scale(${scale})`;

            // Strzał konfetti przy mocnym uderzeniu basu
            // Próg (210) możesz dostosować pod głośność piosenki
            if (bassValue > 210) {
                confetti({
                    particleCount: 5, // Mało cząsteczek, bo bas uderza często
                    startVelocity: 30,
                    spread: 360,
                    origin: { x: Math.random(), y: Math.random() - 0.2 },
                    colors: ['#ff9a9e', '#fad0c4', '#fbc2eb']
                });
            }
        }

        function loadTrack(index) {
            audio.src = playlist[index].file;
            trackLabel.innerText = playlist[index].title;
            audio.load();
        }

        function togglePlay() {
            initAudioContext();
            if (!audio.src) loadTrack(currentTrack);
            if (audio.paused) {
                audio.play();
                isPlaying = true;
                document.getElementById('playBtn').innerText = "II";
            } else {
                audio.pause();
                isPlaying = false;
                document.getElementById('playBtn').innerText = "▶";
            }
        }

        function changeTrack(dir) {
            currentTrack = (currentTrack + dir + playlist.length) % playlist.length;
            loadTrack(currentTrack);
            audio.play();
            isPlaying = true;
            document.getElementById('playBtn').innerText = "II";
        }

        // Auto-next
        audio.onended = () => changeTrack(1);

        // Start po kliknięciu
        window.addEventListener('click', () => {
            if (!isPlaying) {
                initAudioContext();
                loadTrack(currentTrack);
                audio.play();
                isPlaying = true;
                document.getElementById('playBtn').innerText = "II";
            }
        }, { once: true });

        // Standardowy strzał co 3 sekundy (niezależnie od basu)
        setInterval(() => {
            if (isPlaying) {
                confetti({ particleCount: 150, spread: 70, origin: { x: 0, y: 0.8 } });
                confetti({ particleCount: 150, spread: 70, origin: { x: 1, y: 0.8 } });
            }
        }, 3000);
    </script>
</body>
</html>
