<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Rodtech - Police 3D Escape</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #00ff88; font-size: 2rem; font-weight: bold; pointer-events: none;
            text-shadow: 0 0 10px #000;
        }
        #instructions {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: #aaa; font-size: 1rem;
        }
    </style>
</head>
<body>

    <div id="ui">SCORE: <span id="scoreVal">0</span></div>
    <div id="instructions">Use ARROWS or WASD to Move | Avoid Traffic & Police</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player, road;
        let traffic = [];
        let police = [];
        let score = 0;
        let speed = 0.5;
        let keys = {};

        function init() {
            // 1. SCENA I KAMERA
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 10, 50); // Efekt mgły w oddali
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 6); // Kamera nad i za autem
            camera.lookAt(0, 0, -5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 2. ŚWIATŁO
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(0, 10, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // 3. DROGA
            const roadGeo = new THREE.PlaneGeometry(10, 1000);
            const roadMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
            road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            // 4. GRACZ (Twoje auto)
            const playerGeo = new THREE.BoxGeometry(0.8, 0.5, 1.5);
            const playerMat = new THREE.MeshPhongMaterial({ color: 0x00d4ff });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.y = 0.25;
            scene.add(player);

            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);

            animate();
        }

        function spawnTraffic() {
            if (Math.random() < 0.05) {
                const geo = new THREE.BoxGeometry(0.8, 0.5, 1.5);
                const mat = new THREE.MeshPhongMaterial({ color: 0x555555 });
                const car = new THREE.Mesh(geo, mat);
                car.position.set((Math.random() - 0.5) * 8, 0.25, -50);
                scene.add(car);
                traffic.push(car);
            }
        }

        function spawnPolice() {
            if (Math.random() < 0.01) {
                const geo = new THREE.BoxGeometry(0.8, 0.6, 1.5);
                const mat = new THREE.MeshPhongMaterial({ color: 0xff0055 });
                const cop = new THREE.Mesh(geo, mat);
                cop.position.set((Math.random() - 0.5) * 8, 0.3, -60);
                scene.add(cop);
                police.push(cop);
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            // Ruch gracza
            if ((keys['ArrowLeft'] || keys['KeyA']) && player.position.x > -4.5) player.position.x -= 0.1;
            if ((keys['ArrowRight'] || keys['KeyD']) && player.position.x < 4.5) player.position.x += 0.1;

            // System Traffic
            spawnTraffic();
            traffic.forEach((car, index) => {
                car.position.z += speed; // Auta jadą w Twoją stronę
                if (car.position.z > 10) {
                    scene.remove(car);
                    traffic.splice(index, 1);
                }
                // Kolizja
                if (player.position.distanceTo(car.position) < 1) endGame();
            });

            // System Police AI (Podążanie za graczem)
            spawnPolice();
            police.forEach((cop, index) => {
                cop.position.z += speed + 0.1; // Szybsi niż cywile
                // Proste AI: Skręcanie w stronę gracza
                if (cop.position.x < player.position.x) cop.position.x += 0.03;
                if (cop.position.x > player.position.x) cop.position.x -= 0.03;

                if (cop.position.z > 10) {
                    scene.remove(cop);
                    police.splice(index, 1);
                }
                if (player.position.distanceTo(cop.position) < 1) endGame();
            });

            score += 1;
            document.getElementById('scoreVal').innerText = Math.floor(score/10);
            
            renderer.render(scene, camera);
        }

        function endGame() {
            alert("WASTED! Score: " + Math.floor(score/10));
            location.reload();
        }

        init();
    </script>
</body>
</html>
