<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Minecraft 3D - Crafting & Survival</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', 'Minecraft', monospace;
            background: #000;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 0 #000;
            z-index: 100;
            font-family: monospace;
            font-size: 14px;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }
        
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: white;
            text-shadow: 0 0 2px black;
            pointer-events: none;
            z-index: 10;
        }
        
        #inventory {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 12px;
            border: 2px solid #8b6b4d;
            z-index: 20;
            backdrop-filter: blur(5px);
        }
        
        .slot {
            width: 55px;
            height: 55px;
            border: 2px solid #555;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
            background: rgba(0,0,0,0.7);
            cursor: pointer;
            transition: 0.1s;
        }
        
        .slot.active {
            border-color: #ffaa33;
            background: rgba(255,170,51,0.3);
            box-shadow: 0 0 10px gold;
        }
        
        .slot:hover {
            border-color: #ffaa66;
        }
        
        .block-icon {
            font-size: 24px;
        }
        
        #crafting-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            border: 3px solid #8b6b4d;
            border-radius: 20px;
            padding: 20px;
            display: none;
            z-index: 200;
            backdrop-filter: blur(10px);
            min-width: 400px;
        }
        
        .crafting-grid {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        
        .craft-slot {
            width: 60px;
            height: 60px;
            background: #2a2a2a;
            border: 2px solid #8b6b4d;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
        }
        
        .craft-result {
            width: 80px;
            height: 80px;
            background: #2a2a2a;
            border: 3px solid #ffaa33;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 10px auto;
            cursor: pointer;
        }
        
        .close-craft {
            background: #aa4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-family: monospace;
        }
        
        #debug {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #0f0;
            font-size: 11px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-family: monospace;
            pointer-events: none;
            z-index: 100;
        }
        
        #controls-hint {
            position: absolute;
            bottom: 90px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            color: #aaa;
            font-size: 10px;
            pointer-events: none;
        }
        
        @keyframes damage {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.5; }
        }
        
        .damage-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,0,0,0.3);
            pointer-events: none;
            animation: damage 0.2s ease-out;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>❤️ ŻYCIE: <span id="health">100</span>%</div>
        <div>🍗 GŁÓD: <span id="hunger">100</span>%</div>
        <div>🔨 WYBRANY: <span id="selected-block">🌿 TRAWA</span></div>
    </div>
    <div id="crosshair">+</div>
    <div id="inventory">
        <div class="slot" data-block="0">
            <div class="block-icon">🌿</div>
            <div>TRAWA</div>
        </div>
        <div class="slot" data-block="1">
            <div class="block-icon">🟫</div>
            <div>ZIEMIA</div>
        </div>
        <div class="slot" data-block="2">
            <div class="block-icon">🪨</div>
            <div>KAMIEŃ</div>
        </div>
        <div class="slot" data-block="3">
            <div class="block-icon">🪵</div>
            <div>DREWNO</div>
        </div>
        <div class="slot" data-block="4">
            <div class="block-icon">💎</div>
            <div>DIAMENT</div>
        </div>
        <div class="slot" data-block="5">
            <div class="block-icon">🍞</div>
            <div>CHLEB</div>
        </div>
    </div>
    <div id="crafting-panel">
        <h3 style="text-align:center; color:#ffaa33;">🔨 CRAFTING 🔨</h3>
        <div class="crafting-grid" id="crafting-grid">
            <div class="craft-slot" data-craft="0,0"></div>
            <div class="craft-slot" data-craft="0,1"></div>
            <div class="craft-slot" data-craft="0,2"></div>
            <div class="craft-slot" data-craft="1,0"></div>
            <div class="craft-slot" data-craft="1,1"></div>
            <div class="craft-slot" data-craft="1,2"></div>
            <div class="craft-slot" data-craft="2,0"></div>
            <div class="craft-slot" data-craft="2,1"></div>
            <div class="craft-slot" data-craft="2,2"></div>
        </div>
        <div class="craft-result" id="craft-result">❓</div>
        <div style="text-align:center;">
            <button class="close-craft" id="close-craft">ZAMKNIJ (E)</button>
        </div>
    </div>
    <div id="debug">
        FPS: <span id="fps">--</span> | XYZ: <span id="coords">0,0,0</span>
    </div>
    <div id="controls-hint">
        🎮 WASD - ruch | Mysz - obrót | LPM - niszczenie | PPM - stawianie | E - crafting | F3 - debug
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // === INICJALIZACJA ===
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 30, 60);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // Oświetlenie
        const ambientLight = new THREE.AmbientLight(0x8a9a8a, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1);
        dirLight.position.set(10, 20, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const torch = new THREE.PointLight(0xffaa66, 0.6, 12);
        camera.add(torch);
        scene.add(camera);
        
        // === BLOKI ===
        const blockMaterials = [
            new THREE.MeshPhongMaterial({ color: 0x6b8e23 }), // trawa
            new THREE.MeshPhongMaterial({ color: 0x8B5A2B }), // ziemia
            new THREE.MeshPhongMaterial({ color: 0x808080 }), // kamień
            new THREE.MeshPhongMaterial({ color: 0xbc9a6c }), // drewno
            new THREE.MeshPhongMaterial({ color: 0x5bc0ff, emissive: 0x2266aa, emissiveIntensity: 0.1 }), // diament
            new THREE.MeshPhongMaterial({ color: 0xf5de50 })  // chleb
        ];
        
        const blockIcons = ["🌿", "🟫", "🪨", "🪵", "💎", "🍞"];
        const blockNames = ["TRAWA", "ZIEMIA", "KAMIEŃ", "DREWNO", "DIAMENT", "CHLEB"];
        
        let blocks = [];
        let worldData = new Map();
        
        // Gracz
        let player = { x: 0, y: 5, z: 0, angle: 0, pitch: 0 };
        let health = 100;
        let hunger = 100;
        let selectedBlock = 0;
        let gameActive = true;
        
        // Sterowanie
        const keys = { w: false, s: false, a: false, d: false, space: false, shift: false };
        let velocityY = 0;
        let onGround = false;
        
        // Crafting
        let craftingOpen = false;
        let craftingGrid = [
            [null, null, null],
            [null, null, null],
            [null, null, null]
        ];
        
        // Inventory gracza (bloki)
        let playerInventory = {
            0: 64, // trawa
            1: 32, // ziemia
            2: 16, // kamień
            3: 16, // drewno
            4: 0,  // diament
            5: 0   // chleb
        };
        
        // === GENEROWANIE ŚWIATA ===
        function getHeight(x, z) {
            return Math.floor(3 + Math.sin(x * 0.3) * 1.5 + Math.cos(z * 0.3) * 1.5);
        }
        
        function generateWorld() {
            for(let x = -20; x <= 20; x++) {
                for(let z = -20; z <= 20; z++) {
                    const height = getHeight(x, z);
                    
                    // Trawa na górze
                    addBlock(x, height, z, 0);
                    
                    // Ziemia pod spodem
                    for(let y = height - 1; y >= height - 3; y--) {
                        addBlock(x, y, z, 1);
                    }
                    
                    // Kamień głębiej
                    for(let y = height - 4; y >= 0; y--) {
                        addBlock(x, y, z, 2);
                        // Diamenty rzadko
                        if(y < 3 && Math.random() < 0.02) {
                            addBlock(x, y, z, 4);
                        }
                    }
                    
                    // Drewno - drzewa
                    if(height > 3 && Math.random() < 0.12) {
                        const treeHeight = 2 + Math.floor(Math.random() * 2);
                        for(let h = 1; h <= treeHeight; h++) {
                            addBlock(x, height + h, z, 3);
                        }
                        // Liście
                        const leafMat = new THREE.MeshPhongMaterial({ color: 0x44aa44 });
                        for(let dx = -1; dx <= 1; dx++) {
                            for(let dz = -1; dz <= 1; dz++) {
                                if(Math.random() > 0.6) continue;
                                const leafBlock = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), leafMat);
                                leafBlock.position.set(x + dx, height + treeHeight, z + dz);
                                scene.add(leafBlock);
                                blocks.push(leafBlock);
                            }
                        }
                    }
                }
            }
        }
        
        function addBlock(x, y, z, type) {
            if(y < 0 || y > 12) return;
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), blockMaterials[type]);
            mesh.position.set(x, y, z);
            mesh.userData = { type: type };
            scene.add(mesh);
            blocks.push(mesh);
            worldData.set(`${x},${y},${z}`, type);
        }
        
        function removeBlock(block) {
            const idx = blocks.indexOf(block);
            if(idx !== -1) {
                scene.remove(block);
                blocks.splice(idx, 1);
                worldData.delete(`${block.position.x},${block.position.y},${block.position.z}`);
                
                // Dodaj do inventory
                const type = block.userData.type;
                playerInventory[type] = (playerInventory[type] || 0) + 1;
                updateInventoryDisplay();
            }
        }
        
        function placeBlock(x, y, z, type) {
            if(playerInventory[type] <= 0) return false;
            if(y < 0 || y > 12) return false;
            const key = `${Math.floor(x)},${Math.floor(y)},${Math.floor(z)}`;
            if(worldData.has(key)) return false;
            
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), blockMaterials[type]);
            mesh.position.set(Math.floor(x), Math.floor(y), Math.floor(z));
            mesh.userData = { type: type };
            scene.add(mesh);
            blocks.push(mesh);
            worldData.set(key, type);
            
            playerInventory[type]--;
            updateInventoryDisplay();
            return true;
        }
        
        function updateInventoryDisplay() {
            document.querySelectorAll('.slot').forEach((slot, idx) => {
                const type = parseInt(slot.dataset.block);
                const count = playerInventory[type] || 0;
                const existingCount = slot.querySelector('.count');
                if(existingCount) existingCount.remove();
                const countSpan = document.createElement('div');
                countSpan.className = 'count';
                countSpan.style.fontSize = '10px';
                countSpan.style.color = '#ffaa66';
                countSpan.innerText = `${count}`;
                slot.appendChild(countSpan);
            });
        }
        
        // === CRAFTING ===
        const recipes = {
            "🌿🌿🌿🌿🌿🌿🌿🌿🌿": { result: 5, resultName: "🍞 CHLEB", count: 1 }, // 9 trawy = chleb
            "🪵🪵🪵🪵": { result: 3, resultName: "🪵 DREWNO", count: 2 } // drewno crafting
        };
        
        function checkCrafting() {
            const gridStr = craftingGrid.flat().map(item => item || "⬜").join("");
            for(let [pattern, recipe] of Object.entries(recipes)) {
                if(gridStr === pattern) {
                    return recipe;
                }
            }
            return null;
        }
        
        function updateCraftingDisplay() {
            const slots = document.querySelectorAll('.craft-slot');
            for(let i = 0; i < 9; i++) {
                const item = craftingGrid[Math.floor(i/3)][i%3];
                slots[i].innerHTML = item ? blockIcons[item] : "⬜";
            }
            
            const recipe = checkCrafting();
            const resultDiv = document.getElementById('craft-result');
            if(recipe) {
                resultDiv.innerHTML = recipe.resultName;
                resultDiv.style.borderColor = "#ffaa33";
            } else {
                resultDiv.innerHTML = "❓";
                resultDiv.style.borderColor = "#8b6b4d";
            }
        }
        
        function doCraft() {
            const recipe = checkCrafting();
            if(recipe) {
                // Usuń przedmioty z gridu
                for(let i = 0; i < 3; i++) {
                    for(let j = 0; j < 3; j++) {
                        const item = craftingGrid[i][j];
                        if(item !== null) {
                            playerInventory[item]--;
                            craftingGrid[i][j] = null;
                        }
                    }
                }
                playerInventory[recipe.result] = (playerInventory[recipe.result] || 0) + recipe.count;
                updateInventoryDisplay();
                updateCraftingDisplay();
            }
        }
        
        // === KOLIZJE I FIZYKA ===
        function checkCollision(x, y, z, radius = 0.4, height = 1.6) {
            const minX = Math.floor(x - radius);
            const maxX = Math.floor(x + radius);
            const minY = Math.floor(y);
            const maxY = Math.floor(y + height);
            const minZ = Math.floor(z - radius);
            const maxZ = Math.floor(z + radius);
            
            for(let ix = minX; ix <= maxX; ix++) {
                for(let iy = minY; iy <= maxY; iy++) {
                    for(let iz = minZ; iz <= maxZ; iz++) {
                        if(worldData.has(`${ix},${iy},${iz}`)) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }
        
        function updatePlayerMovement() {
            let moveX = 0, moveZ = 0;
            const speed = 4.5;
            const delta = 1/60;
            
            if(keys.w) { moveX -= Math.sin(player.angle); moveZ -= Math.cos(player.angle); }
            if(keys.s) { moveX += Math.sin(player.angle); moveZ += Math.cos(player.angle); }
            if(keys.a) { moveX -= Math.cos(player.angle); moveZ += Math.sin(player.angle); }
            if(keys.d) { moveX += Math.cos(player.angle); moveZ -= Math.sin(player.angle); }
            
            if(moveX !== 0 || moveZ !== 0) {
                const len = Math.hypot(moveX, moveZ);
                moveX /= len;
                moveZ /= len;
            }
            
            let newX = player.x + moveX * speed * delta;
            let newZ = player.z + moveZ * speed * delta;
            
            if(!checkCollision(newX, player.y, player.z, 0.4, 1.6)) player.x = newX;
            if(!checkCollision(player.x, player.y, newZ, 0.4, 1.6)) player.z = newZ;
            
            // Grawitacja
            velocityY -= 9.8 * delta;
            let newY = player.y + velocityY * delta;
            if(!checkCollision(player.x, newY, player.z, 0.4, 1.6)) {
                player.y = newY;
                onGround = false;
            } else {
                if(velocityY < 0) {
                    onGround = true;
                    velocityY = 0;
                } else {
                    velocityY = 0;
                }
            }
            
            // Skok
            if(keys.space && onGround && gameActive) {
                velocityY = 5.2;
                onGround = false;
            }
            
            camera.position.set(player.x, player.y + 1.5, player.z);
            camera.rotation.order = 'YXZ';
            camera.rotation.y = player.angle;
            camera.rotation.x = player.pitch;
        }
        
        // === STEROWANIE ===
        let mouseLocked = false;
        
        document.addEventListener('mousemove', (e) => {
            if(mouseLocked && gameActive && !craftingOpen) {
                player.angle -= e.movementX * 0.003;
                player.pitch -= e.movementY * 0.003;
                player.pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, player.pitch));
            }
        });
        
        document.addEventListener('click', () => {
            if(!mouseLocked && !craftingOpen) {
                document.body.requestPointerLock();
            }
        });
        
        document.addEventListener('pointerlockchange', () => {
            mouseLocked = document.pointerLockElement === document.body;
        });
        
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if(key === 'w') keys.w = true;
            if(key === 's') keys.s = true;
            if(key === 'a') keys.a = true;
            if(key === 'd') keys.d = true;
            if(key === ' ') { keys.space = true; e.preventDefault(); }
            if(key === 'shift') keys.shift = true;
            if(key === 'e' && gameActive) {
                craftingOpen = !craftingOpen;
                document.getElementById('crafting-panel').style.display = craftingOpen ? 'block' : 'none';
                if(craftingOpen) document.exitPointerLock();
                else document.body.requestPointerLock();
            }
            if(key === 'f3') {
                document.getElementById('debug').style.display = document.getElementById('debug').style.display === 'none' ? 'block' : 'none';
            }
            if(key === 'r') restartGame();
        });
        
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if(key === 'w') keys.w = false;
            if(key === 's') keys.s = false;
            if(key === 'a') keys.a = false;
            if(key === 'd') keys.d = false;
            if(key === ' ') keys.space = false;
            if(key === 'shift') keys.shift = false;
        });
        
        // Blokowanie kliknięć
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        
        document.addEventListener('mousedown', (e) => {
            if(!mouseLocked || craftingOpen) return;
            
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(blocks);
            
            if(e.button === 0) { // LPM - niszczenie
                if(intersects.length > 0) {
                    const block = intersects[0].object;
                    const dist = camera.position.distanceTo(block.position);
                    if(dist < 5) {
                        removeBlock(block);
                    }
                }
            } else if(e.button === 2) { // PPM - stawianie
                if(intersects.length > 0) {
                    const block = intersects[0].object;
                    const norm = intersects[0].face.normal;
                    const newX = block.position.x + norm.x;
                    const newY = block.position.y + norm.y;
                    const newZ = block.position.z + norm.z;
                    const dist = camera.position.distanceTo(new THREE.Vector3(newX, newY, newZ));
                    if(dist < 5) {
                        placeBlock(newX, newY, newZ, selectedBlock);
                    }
                }
            }
        });
        
        // Wybór bloku
        document.querySelectorAll('.slot').forEach((slot, idx) => {
            slot.addEventListener('click', () => {
                selectedBlock = parseInt(slot.dataset.block);
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
                slot.classList.add('active');
                document.getElementById('selected-block').innerText = blockNames[selectedBlock];
            });
            if(idx === 0) slot.classList.add('active');
        });
        
        // Crafting slots
        document.querySelectorAll('.craft-slot').forEach(slot => {
            slot.addEventListener('click', () => {
                if(!craftingOpen) return;
                const [row, col] = slot.dataset.craft.split(',').map(Number);
                // Pokaż menu wyboru bloku
                const blockType = prompt(`Wybierz blok (0-${blockMaterials.length-1}):\n0-TRAWA,1-ZIEMIA,2-KAMIEŃ,3-DREWNO,4-DIAMENT`, "0");
                if(blockType !== null && blockType >= 0 && blockType < blockMaterials.length) {
                    const type = parseInt(blockType);
                    if(playerInventory[type] > 0) {
                        craftingGrid[row][col] = type;
                        playerInventory[type]--;
                        updateInventoryDisplay();
                        updateCraftingDisplay();
                    }
                }
            });
        });
        
        document.getElementById('craft-result').addEventListener('click', () => {
            if(craftingOpen) doCraft();
        });
        
        document.getElementById('close-craft').addEventListener('click', () => {
            craftingOpen = false;
            document.getElementById('crafting-panel').style.display = 'none';
            document.body.requestPointerLock();
        });
        
        // === GŁÓD I ZDROWIE ===
        function updateHungerAndHealth() {
            if(!gameActive) return;
            
            // Głód spada z czasem
            if(Math.random() < 0.005) {
                hunger = Math.max(0, hunger - 0.5);
                document.getElementById('hunger').innerText = Math.floor(hunger);
            }
            
            // Leczenie przy pełnym głodzie
            if(hunger > 90 && health < 100 && Math.random() < 0.02) {
                health = Math.min(100, health + 1);
                document.getElementById('health').innerText = Math.floor(health);
            }
            
            // Głód poniżej 10% - obrażenia
            if(hunger < 10 && Math.random() < 0.03) {
                health = Math.max(0, health - 1);
                document.getElementById('health').innerText = Math.floor(health);
                if(health <= 0) {
                    gameActive = false;
                    alert("💀 ZGINĄŁEŚ Z GŁODU! 💀\nKliknij OK, aby rozpocząć od nowa.");
                    restartGame();
                }
            }
            
            // Jedzenie chleba
            if(selectedBlock === 5 && playerInventory[5] > 0) {
                if(hunger < 95) {
                    playerInventory[5]--;
                    hunger = Math.min(100, hunger + 20);
                    updateInventoryDisplay();
                    document.getElementById('hunger').innerText = Math.floor(hunger);
                }
            }
        }
        
        // === DEBUG ===
        let fps = 0;
        let fpsCount = 0;
        let lastTime = performance.now();
        
        function updateDebug() {
            fpsCount++;
            const now = performance.now();
            if(now - lastTime >= 1000) {
                fps = fpsCount;
                fpsCount = 0;
                lastTime = now;
                document.getElementById('fps').innerText = fps;
            }
            document.getElementById('coords').innerText = `${Math.floor(player.x)},${Math.floor(player.y)},${Math.floor(player.z)}`;
        }
        
        function restartGame() {
            blocks.forEach(b => scene.remove(b));
            blocks = [];
            worldData.clear();
            player = { x: 0, y: 5, z: 0, angle: 0, pitch: 0 };
            health = 100;
            hunger = 100;
            velocityY = 0;
            gameActive = true;
            playerInventory = { 0: 64, 1: 32, 2: 16, 3: 16, 4: 0, 5: 0 };
            craftingGrid = [[null, null, null], [null, null, null], [null, null, null]];
            generateWorld();
            updateInventoryDisplay();
            updateCraftingDisplay();
            document.getElementById('health').innerText = "100";
            document.getElementById('hunger').innerText = "100";
        }
        
        // === GŁÓWNA PĘTLA ===
        generateWorld();
        updateInventoryDisplay();
        
        function animate() {
            requestAnimationFrame(animate);
            
            if(gameActive && mouseLocked && !craftingOpen) {
                updatePlayerMovement();
                updateHungerAndHealth();
                updateDebug();
                
                // Latarka
                torch.intensity = 0.6 + Math.random() * 0.2;
            }
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        console.log("Minecraft 3D - Gra uruchomiona!");
    </script>
</body>
</html>
